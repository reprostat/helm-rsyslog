apiVersion: {{ include "common.capabilities.statefulset.apiVersion" . }}
kind: StatefulSet
metadata:
  name: {{ template "rsyslog.fullname" . }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: {{ template "rsyslog.fullname" . }}
    release: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}  
  selector:
    matchLabels: {{ include "common.labels.matchLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ template "rsyslog.fullname" . }}
  {{- if .Values.updateStrategy }}      
  updateStrategy:
  {{ toYaml .Values.updateStrategy | nindent 4 }}
  {{- end }}      
  template:
    metadata:
      labels:  {{- include "common.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: {{ template "rsyslog.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ template "rsyslog.fullname" . }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
        
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30   
      {{- if and .Values.logrotate.enabled .Values.logrotate.config.olddir }}
      initContainers:
        - name: init-logrotate-olddir
          image: busybox
          command: ["sh", "-c", "mkdir -p /var/log/{{ .Values.logrotate.config.olddir }}"]
          volumeMounts:
          - name: logs
            mountPath: /var/log          
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image.repository }}:{{ ternary "latest" (default .Chart.AppVersion .Values.image.tag) .Values.tls.enabled }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- if .Values.tls.enabled }}
          env:
            - name: ENABLE_UDP
              value: "off"
            - name: ENABLE_TCP
              value: "off"
            - name: ENABLE_TLS
              value: "on"
            - name: TLS_CA_FILE
              value: "/etc/rsyslog.d/certs/ca.crt"
            - name: TLS_CERT_FILE
              value: "/etc/rsyslog.d/certs/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/rsyslog.d/certs/tls.key"
            - name: TLS_AUTH_MODE
              value: "{{ .Values.tls.authMode }}"
          {{- end }}

          {{- if .Values.extraEnvVarsSecret }}
          envFrom:
            - secretRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.extraEnvVarsSecret "context" $) }}
          {{- end }}

          ports:
          - containerPort: {{ ternary 6514 514 .Values.tls.enabled }}
            name: rsyslog-port
            protocol: TCP
          
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- if .Values.tls.enabled }}
            exec:
              command:
                - /bin/bash
                - -c
                - "pidof rsyslogd >/dev/null || exit 1"
            {{- else }}
            tcpSocket:
              port: rsyslog-port
            {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- if .Values.tls.enabled }}
            exec:
              command:
                - /bin/bash
                - -c
                - "pidof rsyslogd >/dev/null || exit 1"
            {{- else }}
            tcpSocket:
              port: rsyslog-port
            {{- end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- if .Values.tls.enabled }}
            exec:
              command:
                - /bin/bash
                - -c
                - "pidof rsyslogd >/dev/null || exit 1"
            {{- else }}
            tcpSocket:
              port: rsyslog-port
            {{- end }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: logs
              mountPath: /var/log
          {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/rsyslog.d/certs
              readOnly: true
          {{- end }}
          {{- if .Values.extraVolumeMounts }}
          {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
          {{- end }}
      {{- if .Values.logrotate.enabled }}
        - name: logrotate
          image: {{ printf "%s:%s" .Values.logrotate.image.repository .Values.logrotate.image.tag }}
          imagePullPolicy: {{ .Values.logrotate.image.pullPolicy | quote }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.logrotate.resources | nindent 12 }}
          volumeMounts:
            - name: logs
              mountPath: /var/log
            - name: logrotate-config
              mountPath: /etc/logrotate.conf
              subPath: logrotate.conf
      {{- end }}

      {{- if .Values.extraSidecars }}
      {{- include "common.tplvalues.render" ( dict "value" .Values.extraSidecars "context" $) | nindent 8 }}
      {{- end }}

      {{- if or (and .Values.persistence.enabled .Values.persistence.existingClaim) .Values.tls.enabled  .Values.logrotate.enabled .Values.extraVolumes }}
      volumes:
      {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
      {{- end }}
      {{- if .Values.logrotate.enabled }}
        - name: logrotate-config
          configMap:
            name: {{ template "rsyslog.fullname" . }}-logrotate-config
      {{- end }}
      {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
      {{- end }}
      {{- if .Values.extraVolumes }}
      {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumes "context" $) | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.hostAliases }}
      hostAliases:
      {{- toYaml .Values.hostAliases | nindent 8 }}
      {{- end }}
  {{- if and (not .Values.persistence.existingClaim)  .Values.persistence.enabled }}      
  volumeClaimTemplates:
    - metadata:
        name: logs
        annotations:
        {{- range $key, $value := .Values.persistence.annotations }}
          {{ $key }}: {{ $value }}
        {{- end }}
      spec:
        accessModes:
        {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
      {{- if .Values.persistence.storageClass }}
      {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
      {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
      {{- end }}
      {{- end }}
  {{- else if (not .Values.persistence.enabled) }}
        - name: logs
          emptyDir: {}
  {{- end }}